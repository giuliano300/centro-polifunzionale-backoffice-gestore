<ng-container *ngIf="auth.isAuthenticated(); else publicPage">
  <div class="app-shell">
    <aside class="side">
      <div class="brand">
        <span class="brand-icon">
          <img src="/images/logo.svg" alt="N'Agorà">
        </span>
        <div>
          <span>N'Agorà</span>
          <strong>Gestore</strong>
        </div>
      </div>
      <nav>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <i class="ri-dashboard-line"></i>
          <span>Dashboard</span>
        </a>
        <a routerLink="/spaces" routerLinkActive="active">
          <i class="ri-building-4-line"></i>
          <span>Spazi</span>
        </a>
        <a routerLink="/bookings" routerLinkActive="active">
          <i class="ri-calendar-check-line"></i>
          <span>Prenotazioni</span>
        </a>
        <a routerLink="/courses" routerLinkActive="active">
          <i class="ri-graduation-cap-line"></i>
          <span>Corsi</span>
        </a>
      </nav>
      <button mat-button class="action-cancel logout-button" (click)="logout()">
        <i class="ri-logout-box-r-line"></i>
        <span>Esci</span>
      </button>
    </aside>
    <main>
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-container>

<ng-template #publicPage>
  <router-outlet></router-outlet>
</ng-template>
